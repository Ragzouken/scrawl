<!DOCTYPE html>
<html lang="en">

<head>
  <title>crawl tool</title>
  
  <!-- <link href="./css/engine.css" rel="stylesheet"> -->

  <!-- <script src="./js/howler.core.min.js"></script>
  <script src="./js/peggy.min.js"></script>
  <script src="./js/utility.js"></script>
  <script src="./js/engine.js"></script> -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    * {
      box-sizing: border-box;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    :root {
      font-family: monospace;
      line-height: 1.5;
      overscroll-behavior: none;
    }

    fieldset {
      all: unset;
    }

    html {
      overflow: hidden;
    }

    body {
      margin: 0;
      padding: 0;

      position: absolute;
      inset: 0;

      overflow: hidden;

      background-color: black;
      color: white;
    }

    main {
      position: absolute;
      z-index: 0;
      
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);

      width: 480px;
      height: 768px;

      display: grid;
      grid-template-rows: 1fr min-content;
      pointer-events: none;
    }

    #viewport {
      grid-area: 1 / 1 / 2 / 2;
      overflow: hidden;
      pointer-events: none;
    }

    #border {
      position: relative;

      height: 100%;
      width: 100%;
      
      /* box-sizing: content-box; */
      /* transform: translate(-50%, 0); */

      grid-area: 1 / 1 / 2 / 2;
      background: transparent;
      pointer-events: none;
    }

    #display {
      position: absolute;
      overflow: hidden;
      border-radius: 1rem;
      /* transform: translate(-50%, 0); */
    }

    #display canvas {
      position: relative;
      inset: 0;
      image-rendering: pixelated;
      touch-action: none;
    }

    #controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);

      padding: .5em 0;
      gap: .5em;

      height: 250px;
      pointer-events: all;
    }

    button {
      font-family: inherit;
      background: darkgrey;
      font-size: 2rem;

      cursor: pointer;
    }

    button:active, button.active {
      filter: brightness(50%);
    }

    .ui-border {
      border: solid white .5rem;
      border-left-color: grey;
      border-bottom-color: grey;
      border-radius: 1rem;
    }

    .ui-dialogue {
      padding: .5em .75em;

      font-size: 1.5rem;
      font-family: monospace;
      line-height: 1.25em;

      /* background: black;
      color: white; */
    }

    #dialogue {
      position: absolute;
      
      width: 100%;
      bottom: 250px;
      height: min-content;

      cursor: pointer;

      background: black;
      color: white;
    }

    #dialogue-blocker {
      position: absolute;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0) 0%, 
        rgba(0, 0, 0, 1) 2rem);

      width: 100%;
      top: calc(55% - 2rem);
      bottom: 0;

      opacity: 0.75;

      cursor: pointer;
    }

    #dialogue-content {
      white-space: pre-wrap;
    }

    @keyframes flash {
      from {
        filter: grayscale() brightness(50%);
      }
      to {
        filter: grayscale() brightness(100%);
      }
    }

    #dialogue-prompt {
      position: absolute;

      left: 50%;
      transform: translate(-50%, .125rem);
      font-size: 1.5rem;

      padding: 0;
      margin: 0;

      animation: 1s ease-in-out infinite alternate flash;
    }

    #dialogue-choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);

      padding: .5em 0;
      gap: .5em;

      position: absolute;

      width: 100%;
      top: 505px;
      height: min-content;
    }

    #dialogue-choices button {
      /* background: black; */
      /* color: white; */
      font-size: 1.25rem;


    }

    #loading {
      position: absolute;
      inset: 0;

      border: none;
      outline: none;
      background: none;
      color: white;
    }

    #loading::backdrop {
      background: black;
    }
  </style>
</head>

<body>
  <script id="importmap" type="application/json">
    {
      "imports": {
        "atlas": "./js/atlas.js",
        "start": "./js/start.js",
        "text": "./js/text.js",
        "three": "./js/three.module.min.js",
        "stats": "./js/stats.module.js"
      }
    }
  </script>

  <script>
    const dataElement = document.getElementById("importmap");
    const data = JSON.parse(dataElement.textContent);
    dataElement.remove();

    //data.imports.shit = "./js/test-shit-other.js";
    const mapElement = document.createElement("script");
    mapElement.type = "importmap";
    mapElement.textContent = JSON.stringify(data);
    document.body.append(mapElement);
  </script>

  <script type="module">
    import start from "start";
    document.addEventListener("DOMContentLoaded", start);
  </script>

  <div id="display"></div>

  <main>
    <div id="viewport"></div>
    <div id="border" class="ui-border"></div>
    <div>
      <div id="controls">
      </div>
      <div id="dialogue-blocker" hidden></div>
      <div id="dialogue" class="ui-border ui-dialogue" hidden>
        <div id="dialogue-content"></div>
        <div id="dialogue-prompt">🔽</div>
      </div>
      <!-- <div id="dialogue-choices">
        <button class="ui-border ui-dialogue">Fuck you.</button>
        <button class="ui-border ui-dialogue">Join me.</button>
        <button class="ui-border ui-dialogue">Give me life stones.</button>
      </div> -->
    </div>
  </main>

  <dialog id="loading">
    <h1>loading...</h1>
  </dialog>
  <script>document.querySelector("#loading").showModal()</script>
</body>

</html>
